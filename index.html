<!DOCTYPE html>
<html>
<head>
<style>

  body {
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: rgb(12, 212, 1);
    font-family: Arial, sans-serif;
  }

.top-left {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 15px;
  font-family: "Trebuchet MS", sans-serif;
  color: #ffffff;
  letter-spacing: 3px;
  text-shadow:
    0 0 5px #00fff2,
    0 0 10px #00fff2,
    0 0 20px #00fff2,
    0 0 40px #00aaff;
}

#levelText {
  margin-top: 20px;
  margin-bottom: 5px;
  font-size: 32px;
  letter-spacing: 2px;
}

#scoreText {
  margin-bottom: 10px;
  font-size: 24px;
  color: yellow;
  letter-spacing: 2px;
}

canvas {
  background: #111;
  border: 3px solid lime;
}

/* ⭐ Bottom-left A.R.T.S ⭐ */
.footer {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 9999;
  font-size: 20px;
  font-family: "Trebuchet MS", sans-serif;
  color: #bff7ff;
  letter-spacing: 2px;
  text-shadow:
    0 0 5px #00ddff,
    0 0 10px #00fff2,
    0 0 20px #00fff2;
  pointer-events: none;
}

/* ⭐ TRY AGAIN Overlay ⭐ */
#tryAgainOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.tryText {
  font-size: 60px;
  color: #00fff2;
  letter-spacing: 5px;
  font-family: "Trebuchet MS", sans-serif;
  text-shadow:
    0 0 10px #00fff2,
    0 0 20px #00fff2,
    0 0 40px #00aaff,
    0 0 80px #00aaff;
  margin-bottom: 30px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0.5; transform: scale(1); }
}

#restartBtn {
  padding: 12px 25px;
  font-size: 22px;
  border: none;
  border-radius: 8px;
  background: #00fff2;
  color: black;
  cursor: pointer;
  box-shadow: 0 0 15px #00fff2;
}

#restartBtn:hover {
  background: #00aaff;
  box-shadow: 0 0 25px #00aaff;
}

/* ⭐ Touch Buttons ⭐ */
#touchControls {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%); /* centers it */
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 999999;
}

.row {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

/* 💸 MONEY THEME BUTTONS 💸 */
.cbtn {
  width: 130px;
  height: 130px;
  border-radius: 25px;
  background: #00ff66;
  color: black;
  font-size: 55px;
  font-family: "Trebuchet MS", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow:
    0 0 10px #00ff66,
    0 0 20px #00ff66,
    0 0 40px #00cc44,
    0 0 60px #009933;
  cursor: pointer;
  user-select: none;
}

.cbtn:active {
  background: #00cc44;
  box-shadow:
    0 0 20px #00cc44,
    0 0 40px #009933,
    0 0 60px #007722;
}

</style>
</head>

<body>

<div class="top-left">Rich Folly Gaming</div>

<div id="levelText">LEVEL 1</div>
<div id="scoreText">SCORE: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<!-- ⭐ WIN SONG ⭐ -->
<audio id="winSong" src="Whatever_it_takes.mp3"></audio>

<!-- ⭐ TRY AGAIN OVERLAY ⭐ -->
<div id="tryAgainOverlay">
    <div class="tryText">TRY AGAIN FOLLY</div>
    <button id="restartBtn">Restart</button>
</div>

<!-- ⭐ Bottom-left A.R.T.S ⭐ -->
<div class="footer"> {A.R.T.S}</div>

<!-- ⭐ Touch Controls (Emoji Cash) ⭐ -->
<div id="touchControls">
    <div class="row">
        <div class="cbtn" id="upBtn">💸</div>
    </div>
    <div class="row">
        <div class="cbtn" id="leftBtn">💵</div>
        <div class="cbtn" id="downBtn">💸</div>
        <div class="cbtn" id="rightBtn">💵</div>
    </div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 20;
let snake = [{ x: 200, y: 200 }];

const dirs = [
  { x: 1, y: 0 },
  { x: -1, y: 0 },
  { x: 0, y: 1 },
  { x: 0, y: -1 }
];
let dir = dirs[Math.floor(Math.random() * dirs.length)];

let food = randomFood();
let fakeFood = null;

let score = 0;
let level = 1;
let maxLevel = 10;

let lastMove = 0;
let moveDelay = 120;

let glow = false;
let movingFood = false;
let walls = false;

const levelText = document.getElementById("levelText");
const scoreText = document.getElementById("scoreText");


// ⭐ Load PNG Image ⭐
const fourImg = new Image();
fourImg.src = "images/four.png";
let fourLoaded = false;

fourImg.onload = () => {
    fourLoaded = true;
};


// ⭐ Restart Button ⭐
document.getElementById("restartBtn").addEventListener("click", () => {
    location.reload();
});
window.addEventListener("keydown", (e) => {
    if (document.getElementById("tryAgainOverlay").style.display === "flex") {
        if (e.key === "ArrowUp") {
            location.reload();
        }
    }
});


window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp" && dir.y !== 1) dir = { x: 0, y: -1 };
  if (e.key === "ArrowDown" && dir.y !== -1) dir = { x: 0, y: 1 };
  if (e.key === "ArrowLeft" && dir.x !== 1) dir = { x: -1, y: 0 };
  if (e.key === "ArrowRight" && dir.x !== -1) dir = { x: 1, y: 0 };
});


// ⭐ Touch + Click Controls ⭐
function bindButton(id, action) {
    const btn = document.getElementById(id);

    btn.addEventListener("touchstart", action);
    btn.addEventListener("click", action);
}

bindButton("upBtn", () => {
    if (dir.y !== 1) dir = { x: 0, y: -1 };
});

bindButton("downBtn", () => {
    if (dir.y !== -1) dir = { x: 0, y: 1 };
});

bindButton("leftBtn", () => {
    if (dir.x !== 1) dir = { x: -1, y: 0 };
});

bindButton("rightBtn", () => {
    if (dir.x !== -1) dir = { x: 1, y: 0 };
});


function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * size,
    y: Math.floor(Math.random() * 20) * size
  };
}

function updateLevel() {
  level = Math.min(maxLevel, Math.floor(score / 5) + 1);
  levelText.textContent = "LEVEL " + level;

  if (level >= 3) moveDelay = Math.max(40, 120 - (level - 2) * 10);
  if (level >= 4) walls = true;
  if (level >= 5) snake.growAmount = 2;
  if (level >= 6) movingFood = true;
  if (level >= 7) glow = true;
  if (level >= 8 && !fakeFood) fakeFood = randomFood();
}

function update(timestamp) {
  if (timestamp - lastMove > moveDelay) {
    lastMove = timestamp;

    const head = {
      x: snake[0].x + dir.x * size,
      y: snake[0].y + dir.y * size
    };

    // ⭐ WALL COLLISION → SHOW OVERLAY ⭐
    if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
      document.getElementById("tryAgainOverlay").style.display = "flex";
      return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      document.getElementById("tryAgainOverlay").style.display = "flex";
      return;
    }

    // Fake food collision
    if (fakeFood && head.x === fakeFood.x && head.y === fakeFood.y) {
      document.getElementById("tryAgainOverlay").style.display = "flex";
      return;
    }

    snake.unshift(head);

    // ⭐ FOOD EAT + WIN CHECK ⭐
    if (head.x === food.x && head.y === food.y) {
        score++;
        scoreText.textContent = "SCORE: " + score;

        updateLevel();

        if (level === maxLevel && score >= maxLevel * 5) {
            document.getElementById("winSong").play();
            alert("4 the Love of $");
            alert("Song: Whatever It Takes by Joe Strvp");
            location.reload();
            return;
        }

        food = randomFood();

        if (level >= 8) fakeFood = randomFood();
    } else {
        snake.pop();
    }

    // Moving food
    if (movingFood && Math.random() < 0.2) {
      food.x += (Math.random() < 0.5 ? -1 : 1) * size;
      food.y += (Math.random() < 0.5 ? -1 : 1) * size;
      food.x = Math.max(0, Math.min(380, food.x));
      food.y = Math.max(0, Math.min(380, food.y));
    }
  }

  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.clearRect(0, 0, 400, 400);

  if (fourLoaded) {
      ctx.drawImage(fourImg, 120, 120, 160, 160);
  }

  if (walls) {
    ctx.fillStyle = "gray";
    ctx.fillRect(0, 0, 400, 20);
    ctx.fillRect(0, 380, 400, 20);
    ctx.fillRect(0, 0, 20, 400);
    ctx.fillRect(380, 0, 20, 400);
  }

  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, size, size);

  if (fakeFood) {
    ctx.fillStyle = "purple";
    ctx.fillRect(fakeFood.x, fakeFood.y, size, size);
  }

  ctx.fillStyle = glow ? "#00ffea" : "lime";
  snake.forEach(s => ctx.fillRect(s.x, s.y, size, size));
}

requestAnimationFrame(update);

</script>

<p style="color:white; margin-top:20px;">Can You Win? He`s A Imposter, Catch Him For Me!</p>

</body>
</html>
